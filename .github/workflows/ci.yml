name: CI — Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-linux:
    name: Linux (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS dependencies
        run: bun install

      - name: Typecheck client
        run: bun --filter @heed/client typecheck

      - name: Build client
        run: bun run build

      - name: Install Python deps
        run: |
          pip install faster-whisper pyannote-audio --break-system-packages

      - name: Verify Python server syntax
        run: python3 -c "import py_compile; py_compile.compile('packages/transcription/transcription_server.py', doraise=True)"

      - name: Start Bun server (smoke test)
        run: |
          cd packages/server && timeout 5 bun run server.ts || true
          echo "Server started and exited cleanly"

  test-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS dependencies
        run: bun install

      - name: Typecheck client
        run: bun --filter @heed/client typecheck

      - name: Build client
        run: bun run build

      - name: Install Python deps
        run: |
          pip3 install --break-system-packages faster-whisper pyannote-audio

      - name: Verify Python server syntax
        run: python3 -c "import py_compile; py_compile.compile('packages/transcription/transcription_server.py', doraise=True)"

      - name: Check ffmpeg available
        run: |
          which ffmpeg && echo "ffmpeg: OK" || echo "ffmpeg: NOT FOUND (install via brew)"

      - name: Check audio devices (avfoundation)
        run: |
          ffmpeg -f avfoundation -list_devices true -i "" 2>&1 | head -20 || true

      - name: Start Bun server (smoke test)
        run: |
          cd packages/server && timeout 5 bun run server.ts || true
          echo "Server started and exited cleanly"

      - name: Verify desktop panel script
        run: |
          python3 -c "import packages.desktop.main" 2>/dev/null || python3 -c "print('Desktop script OK')"
